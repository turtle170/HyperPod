ShortDescription: Lightweight VMM with burstable CPU scaling for Windows (WHPX) and Linux (KVM)
Description: |-
  HyperPod is an open-source, lightweight virtual machine manager written in safe Rust.
  It targets Windows-first via the Windows Hypervisor Platform (WHPX) API, with a
  secondary backend for Linux via KVM.

  Key features:
  - Native Windows support via WinHvPlatform.dll — no QEMU, no Docker Desktop, no WSL.
  - Burstable CPU scaling: a rayon-powered monitor watches host load and adjusts the
    VM's CPU quota in real time (Windows: JobObject CpuRate; Linux: cgroup-v2 cpu.weight).
  - One config file (HyperPod.toml) covers kernel, rootfs, RAM/CPU limits, and GPU policy.
  - Storage backends: .raw / .img / .ext4 and fixed .vhd. Dynamic VHD and VHDX are
    rejected with actionable conversion hints.
  - GPU policy config (credits or full); enforcement is planned for 0.4.x.
