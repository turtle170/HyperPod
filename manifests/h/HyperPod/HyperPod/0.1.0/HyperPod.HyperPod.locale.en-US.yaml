ReleaseNotes: |-
  Initial release (0.1.0).
  - WHPX partition + vCPU setup (Windows-primary)
  - KVM backend (Linux-secondary)
  - Burstable CPU scaling engine (no mocks, hard-error on unavailable probe)
  - VirtIO-MMIO v2 transport and descriptor-chain walker (unit-tested; wiring pending interrupt injection in 0.2.0)
  - Token-bucket I/O throttler
  - Storage: raw, fixed-VHD; hard-error on dynamic-VHD / VHDX
  - 29 unit tests, 0 failures
